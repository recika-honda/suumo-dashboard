<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SUUMO 入稿</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <h1>SUUMO 入稿</h1>

  <section>
    <header class="section-head">
      <span class="section-num">01</span>
      <span class="section-title">新規入稿</span>
    </header>
    <form id="run-form">
      <input type="text" id="reinsId" inputmode="numeric" pattern="\d+"
             placeholder="REINS 物件番号 (数字のみ)" required autocomplete="off">
      <button type="submit">入稿実行</button>
    </form>
  </section>

  <section id="progress-section" hidden>
    <header class="section-head">
      <span class="section-num">02</span>
      <span class="section-title">進捗</span>
      <span class="section-meta" id="progress-meta"></span>
    </header>
    <p id="progress-runid"></p>
    <ol id="progress-steps"></ol>
    <p id="progress-result"></p>
  </section>

  <section>
    <header class="section-head">
      <span class="section-num">03</span>
      <span class="section-title">履歴</span>
      <span class="section-meta">latest 50</span>
    </header>
    <ul id="history-list"><li class="muted">loading...</li></ul>
  </section>
</main>

<script>
// ISO8601 UTC (例: "2026-05-13T03:41:43.906Z") をブラウザのローカル TZ で MM-DD HH:MM に。
function formatLocalTs(iso) {
  if (!iso) return '----- --:--';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '----- --:--';
  const pad = (n) => String(n).padStart(2, '0');
  return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

const form           = document.getElementById('run-form');
const reinsIdInput   = document.getElementById('reinsId');
const submitBtn      = form.querySelector('button');
const progressSection= document.getElementById('progress-section');
const progressMeta   = document.getElementById('progress-meta');
const progressRunid  = document.getElementById('progress-runid');
const progressSteps  = document.getElementById('progress-steps');
const progressResult = document.getElementById('progress-result');
const historyList    = document.getElementById('history-list');

let pollTimer = null;

form.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const reinsId = reinsIdInput.value.trim();
  if (!/^\d+$/.test(reinsId)) return;

  progressSection.hidden = false;
  progressMeta.textContent   = 'starting...';
  progressRunid.textContent  = '';
  progressSteps.innerHTML    = '';
  progressResult.textContent = '';
  submitBtn.disabled = true;

  try {
    const resp = await fetch('/run', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ reinsId }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.runId) {
      progressResult.textContent = 'エラー: ' + (data.error || 'unknown');
      submitBtn.disabled = false;
      return;
    }
    progressRunid.textContent = 'runId: ' + data.runId;
    startPolling(data.runId);
  } catch (e) {
    progressResult.textContent = '通信エラー: ' + e.message;
    submitBtn.disabled = false;
  }
});

function startPolling(runId) {
  if (pollTimer) clearInterval(pollTimer);
  let lastIdx = -1;
  pollTimer = setInterval(async () => {
    try {
      const r = await fetch('/status/' + encodeURIComponent(runId));
      if (!r.ok) return;
      const data = await r.json();
      const steps = data.steps || [];
      for (let i = lastIdx + 1; i < steps.length; i++) {
        const li = document.createElement('li');
        const extra = steps[i].error ? ' — ' + steps[i].error.slice(0, 80)
                    : steps[i].count != null ? ' (' + steps[i].count + ')'
                    : '';
        li.textContent = steps[i].name + extra;
        progressSteps.appendChild(li);
      }
      lastIdx = steps.length - 1;
      progressMeta.textContent = steps.length + ' events';

      if (data.status) {
        clearInterval(pollTimer); pollTimer = null;
        submitBtn.disabled = false;
        const scoreText = data.score ? ' / ' + data.score + 'pt' : '';
        progressResult.textContent = '完了: ' + data.status + scoreText;
        progressMeta.textContent = steps.length + ' events / done';
        loadHistory();
      }
    } catch (_) { /* ignore transient */ }
  }, 3000);
}

async function loadHistory() {
  try {
    const r = await fetch('/history');
    const data = await r.json();
    historyList.innerHTML = '';
    const items = data.history || [];
    if (items.length === 0) {
      const li = document.createElement('li');
      li.className = 'muted';
      li.textContent = '履歴なし';
      historyList.appendChild(li);
      return;
    }
    for (const h of items) {
      const li = document.createElement('li');
      const ts = formatLocalTs(h.ts);  // ブラウザの JST で MM-DD HH:MM
      const score = h.score ? ' / ' + h.score + 'pt' : '';
      const name = (h.propertyName || h.reinsId || '?').slice(0, 24);
      const status = (h.status || '?').padEnd(8);
      li.textContent = ts + '   ' + status + '   ' + name + score;
      historyList.appendChild(li);
    }
  } catch (e) {
    historyList.innerHTML = '<li class="muted">履歴読み込み失敗</li>';
  }
}

loadHistory();
</script>
</body>
</html>
